name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: pakpos
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: pakpos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: pakpos.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../pakpos-${{ matrix.target }}.tar.gz ${{ matrix.binary_name }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../pakpos-${{ matrix.target }}.zip ${{ matrix.binary_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pakpos-*.tar.gz
            pakpos-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
